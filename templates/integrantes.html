{% extends 'base_clean.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="mb-0" style="color:var(--dark);">Equipo de Desarrollo</h2>
        <a href="javascript:history.back()" class="btn btn-sm" style="background:var(--dark); color:white;">&larr; Regresar</a>
    </div>

    <div class="row g-4">
        {% for p in integrantes %}
        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100" style="border:1px solid rgba(0,0,0,0.08); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                <!-- Imagen del integrante -->
                <div class="position-relative" style="height: 250px; background: linear-gradient(135deg, rgba(230,152,148,0.1) 0%, rgba(121,31,27,0.05) 100%); overflow: hidden;">
                    <img src="{% static p.image %}" alt="{{ p.first_name }} {{ p.last_name }}" class="img-fluid" style="width:100%; height:100%; object-fit: cover;">
                </div>

                <!-- Contenido de la tarjeta -->
                <div class="card-body text-center pb-2">
                    <h5 class="card-title mb-1" style="color:var(--dark);">{{ p.first_name }} {{ p.first_surname }}</h5>
                    <p class="text-muted mb-2" style="font-size:0.95rem;">{{ p.role }}</p>
                    <p class="mb-2" style="font-size:0.9rem; color:#666;">
                        <i class="fas fa-graduation-cap me-1" style="color:var(--main);"></i>
                        <span>Ing. Sistemas Informáticos</span>
                    </p>
                    <p class="mb-0" style="font-size:0.9rem;">
                        <i class="fas fa-envelope me-1" style="color:var(--dark);"></i>
                        <a href="mailto:{{ p.email }}" class="text-decoration-none" style="color:var(--dark);">{{ p.email }}</a>
                    </p>
                </div>

                <!-- Footer con iconos de redes -->
                <div class="card-footer bg-transparent border-top pt-3 pb-3 text-center">
                    <a href="#" class="btn btn-sm btn-outline-secondary me-1" title="GitHub"><i class="fab fa-github"></i></a>
                    <a href="#" class="btn btn-sm btn-outline-secondary" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
