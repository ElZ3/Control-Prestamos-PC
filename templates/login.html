{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - UNICAES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

<div class="login-container">

    <!-- IZQUIERDA -->
    <div class="login-left">
        <img src="{% static 'img/logo_unicaes.png' %}" alt="Logo">
    </div>
    <!-- DERECHA -->
    <div class="login-right">

    <div class="login-title">
        <img src="{% static 'img/letras_unicaes.png' %}" alt="UNICAES">
    </div>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required autofocus>

        <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>

        <button type="submit" class="btn-login w-100">
            LOGIN
        </button>
    </form>
</div>

</div>

</body>
</html>
